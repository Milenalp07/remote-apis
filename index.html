<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Milena Pires - 75632 - Remote APIs</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
text-align:center;
}

button{
padding:10px;
margin:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
}

img{
width:100%;
}

</style>
</head>

<body>

<h1>Remote APIs Project</h1>

<button id="countriesBtn">Countries</button>
<button id="usersBtn">Users</button>
<button id="charactersBtn">Rick & Morty</button>

<div id="results" class="grid"></div>

<script>

const results=document.getElementById("results");

// Fetch countries
async function fetchCountries(){

try{

const response=await fetch("https://restcountries.com/v3.1/region/europe");
const data=await response.json();

results.innerHTML="";

data.forEach(country=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${country.flags.png}">
<h3>${country.name.common}</h3>
<p>Population: ${country.population}</p>
`;

results.appendChild(card);

});

}catch(error){

results.innerHTML="Error loading countries";

}

}

// Fetch users
async function fetchUsers(){

try{

const response=await fetch("https://jsonplaceholder.typicode.com/users");
const users=await response.json();

results.innerHTML="";

users.forEach(user=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<h3>${user.name}</h3>
<p>${user.email}</p>
<p>${user.phone}</p>
`;

results.appendChild(card);

});

}catch(error){

results.innerHTML="Error loading users";

}

}

// Fetch characters
async function fetchCharacters(){

try{

const response=await fetch("https://rickandmortyapi.com/api/character");
const data=await response.json();

results.innerHTML="";

data.results.forEach(character=>{

const card=document.createElement("div");
card.className="card";

card.innerHTML=`
<img src="${character.image}">
<h3>${character.name}</h3>
<p>${character.species}</p>
`;

results.appendChild(card);

});

}catch(error){

results.innerHTML="Error loading characters";

}

}

document.getElementById("countriesBtn").addEventListener("click",fetchCountries);
document.getElementById("usersBtn").addEventListener("click",fetchUsers);
document.getElementById("charactersBtn").addEventListener("click",fetchCharacters);

</script>

</body>
</html>
