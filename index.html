<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Milena Pires - 75632 - Remote APIs</title>

<style>

body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

button,input,select{
padding:10px;
margin:10px;
border-radius:5px;
border:none;
}

button{
background:#38bdf8;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:#1e293b;
padding:15px;
border-radius:10px;
}

img{
width:100%;
border-radius:5px;
}

</style>
</head>

<body>

<h1>Remote APIs Project</h1>

<button id="countriesBtn">Countries</button>
<button id="usersBtn">Users</button>
<button id="charactersBtn">Rick & Morty</button>

<br>

<select id="regionSelect">
<option value="europe">Europe</option>
<option value="asia">Asia</option>
<option value="africa">Africa</option>
<option value="americas">Americas</option>
<option value="oceania">Oceania</option>
</select>

<input id="characterSearch" placeholder="Search character">

<div id="results" class="grid"></div>

<script>

const results=document.getElementById("results");

// Countries API
async function fetchCountries(){

const region=document.getElementById("regionSelect").value;

try{

const response=await fetch(`https://restcountries.com/v3.1/region/${region}`);

if(!response.ok){
throw new Error("API error");
}

const data=await response.json();

results.innerHTML="";

data.forEach(country=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<img src="${country.flags.png}">
<h3>${country.name.common}</h3>
<p>Capital: ${country.capital ? country.capital[0] : "N/A"}</p>
<p>Population: ${country.population}</p>
`;

results.appendChild(card);

});

}catch(error){

results.innerHTML="<p>Error loading countries</p>";

}

}

// Users API
async function fetchUsers(){

try{

const response=await fetch("https://jsonplaceholder.typicode.com/users");

if(!response.ok){
throw new Error("API error");
}

const users=await response.json();

results.innerHTML="";

users.forEach(user=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<h3>${user.name}</h3>
<p>Email: ${user.email}</p>
<p>Phone: ${user.phone}</p>
<p>Company: ${user.company.name}</p>
`;

results.appendChild(card);

});

}catch(error){

results.innerHTML="<p>Error loading users</p>";

}

}

// Rick & Morty API
async function fetchCharacters(){

const name=document.getElementById("characterSearch").value;

let url="https://rickandmortyapi.com/api/character";

if(name){
url+=`/?name=${name}`;
}

try{

const response=await fetch(url);

if(!response.ok){
throw new Error("Character not found");
}

const data=await response.json();

results.innerHTML="";

data.results.forEach(character=>{

const card=document.createElement("div");

card.className="card";

card.innerHTML=`
<img src="${character.image}">
<h3>${character.name}</h3>
<p>Status: ${character.status}</p>
<p>Species: ${character.species}</p>
`;

results.appendChild(card);

});

}catch(error){

results.innerHTML="<p>Character not found</p>";

}

}

document.getElementById("countriesBtn").addEventListener("click",fetchCountries);
document.getElementById("usersBtn").addEventListener("click",fetchUsers);
document.getElementById("charactersBtn").addEventListener("click",fetchCharacters);

</script>

</body>
</html>
